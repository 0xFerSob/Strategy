/* ── TODAY for TTM calc ── */
const TODAY = new Date(2026, 2, 16); // March 16 2026

function ttmStr(matStr) {
  if (!matStr) return null;
  const mat = new Date(matStr);
  const days = Math.round((mat - TODAY) / 86400000);
  if (days <= 0) return "Matured";
  const months = Math.round(days / 30.44);
  const yrs = (days / 365.25).toFixed(1);
  return { months, yrs, label: `${months}mo / ${yrs}yr` };
}

const Tip = ({active,payload,label}) => {
  if(!active||!payload?.length) return null;
  return (
    <div style={{background:"#0a1020",border:"1px solid #1d2e4a",borderRadius:8,padding:"10px 14px",fontSize:12}}>
      <div style={{color:"#8ba3c7",fontWeight:700,marginBottom:6}}>{label}</div>
      {payload.map((p,i)=>(
        <div key={i} style={{color:p.color,marginBottom:2}}>
          {p.name}: <span style={{fontFamily:"monospace"}}>{typeof p.value==="number"?p.value.toLocaleString():p.value}</span>
        </div>
      ))}
    </div>
  );
};

function TTMCell({matStr}) {
  if(!matStr) return <span className="ttm-perp">Perpetual</span>;
  const t = ttmStr(matStr);
  if(!t||t==="Matured") return <span className="ttm-near">Matured</span>;
  const cls = t.months < 30 ? "ttm-near" : t.months < 60 ? "ttm-mid" : "ttm-far";
  return <span className={cls}>{t.label}</span>;
}

function SrcLinks({secLink,pressLink}) {
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
      {secLink && <a href={secLink} target="_blank" rel="noopener noreferrer" className="src-btn src-sec">SEC</a>}
      {pressLink && <a href={pressLink} target="_blank" rel="noopener noreferrer" className="src-btn src-press">PR</a>}
    </div>
  );
}

function CumBadge({v}) {
  if(v===true)  return <span className="cum-yes">● Cumulative</span>;
  if(v===false) return <span className="cum-no">● Non-Cumulative</span>;
  return <span className="cum-na">—</span>;
}
